name: BLT Welcome Video Submission
description: Submit your welcome video entry for the BLT Video Meme contest
title: "[Welcome Video]"
labels: ["welcome-video-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎥 BLT Welcome Video Contest Submission
        Thank you for submitting your welcome video for OWASP BLT.
        Please fill out all fields below.
        Your submission will appear on the [Design Showcase](https://owasp-blt.github.io/BLT-Design-Contest/) once approved.

  - type: textarea
    id: preview_image
    attributes:
      label: Preview Image
      description: >
        Upload a preview thumbnail, screenshot, or teaser of your welcome video by
        dragging and dropping it here, pasting it, or clicking the attachment button.
        GitHub will host the uploaded media automatically.
      placeholder: "Drag & drop or paste your preview here…"
    validations:
      required: true

  - type: input
    id: design_url
    attributes:
      label: Design URL
      description: >
        Link to your welcome video (YouTube, Loom, Drive, or other public link).
      placeholder: "https://..."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Welcome Video Category
      options:
        - Explainer
        - Promotional
        - Educational
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >
        Describe your welcome concept and how it gives a walkthrough of OWASP BLT.
      placeholder: "My welcome video shows..."
      render: markdown
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Agreement
      description: >
        Please confirm the following before submitting.
      options:
        - label: >
            I confirm this is my original work and I grant OWASP BLT
            permission to display and use it on the showcase and in the project.
          required: true