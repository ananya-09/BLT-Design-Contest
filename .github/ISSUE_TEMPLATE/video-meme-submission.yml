name: BLT Video Meme Submission
description: Submit your video meme entry for the BLT Video Meme contest
title: "[Video Meme]"
labels: ["video-meme-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎬 BLT Video Meme Contest Submission
        Thank you for submitting your video meme for OWASP BLT.
        Please fill out all fields below.
        Your submission will appear on the [Design Showcase](https://owasp-blt.github.io/BLT-Design-Contest/) once approved.

  - type: textarea
    id: preview_image
    attributes:
      label: Preview Image
      description: >
        Upload a preview thumbnail, screenshot, or GIF from your video meme by
        dragging and dropping it here, pasting it, or clicking the attachment button.
        GitHub will host the uploaded media automatically.
      placeholder: "Drag & drop or paste your preview here…"
    validations:
      required: true

  - type: input
    id: design_url
    attributes:
      label: Design URL
      description: >
        Link to your video meme (YouTube, Loom, Drive, or other public link).
      placeholder: "https://..."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Video Meme Category
      options:
        - Promotional
        - Educational
        - Humorous
        - Explainer
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >
        Describe your video meme concept and how it represents OWASP BLT.
      placeholder: "My video meme shows..."
      render: markdown
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Agreement
      description: >
        Please confirm the following before submitting.
      options:
        - label: >
            I confirm this is my original work and I grant OWASP BLT
            permission to display and use it on the showcase and in the project.
          required: true